<h2 mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content>
    <ng-container *ngTemplateOutlet="data.contentTemplate; context: { $implicit: data.context }"></ng-container>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-raised-button (click)="close()">Cancel</button>
    <button mat-raised-button color="accent" cdkFocusInitial (click)="save()">Save</button>
</mat-dialog-actions>
