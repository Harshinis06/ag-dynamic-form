<mat-card class="example-card" appearance="outlined" *ngFor="let card of data";>
    <div class="card-header">
        <mat-icon>{{ card.icon }}</mat-icon>
        <mat-card-header>
            <h2>{{ card.title }}</h2>
        </mat-card-header>
    </div>
    <mat-card-content>
        <p>
            {{ card.value }}
        </p>
    </mat-card-content>
</mat-card>
